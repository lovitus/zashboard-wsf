name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GUST_VERSION: '3.2.6'
  GUST_TAG: 'v3.2.6-relay'
  SLIDER_VERSION: '0.1.0'
  SLIDER_TAG: 'v0.1.0-test'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # ------------------------------------------------------------------
      # CI TARGET POLICY (CURRENT PHASE)
      # Enabled release targets:
      # 1) Windows x64 (x86_64-pc-windows-msvc)
      # 2) Windows x86 (i686-pc-windows-msvc)
      # 3) macOS Apple Silicon (aarch64-apple-darwin)
      # 4) Android (separate build-android job below)
      #
      # Temporarily disabled targets:
      # - macOS Intel (x86_64-apple-darwin)
      # - Linux (all variants)
      # - iOS / other architectures
      #
      # Re-enable process:
      # - Uncomment the corresponding matrix items below
      # - Verify sidecar suffix availability in lovitus/gust and lovitus/slider
      # - Run one tagged release to validate packaging/signing
      # ------------------------------------------------------------------
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
            target: x86_64-pc-windows-msvc
            gust_asset_suffix: windows-amd64
            slider_asset_suffix: windows-amd64
            archive: zip
          - platform: windows-latest
            args: '--target i686-pc-windows-msvc --bundles nsis'
            target: i686-pc-windows-msvc
            gust_asset_suffix: windows-386
            slider_asset_suffix: windows-386
            archive: zip
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            gust_asset_suffix: darwin-arm64
            slider_asset_suffix: darwin-arm64
            archive: gz
          # Temporarily disabled: macOS Intel
          # - platform: macos-latest
          #   args: '--target x86_64-apple-darwin'
          #   target: x86_64-apple-darwin
          #   gust_asset_suffix: darwin-amd64
          #   slider_asset_suffix: darwin-amd64
          #   archive: gz
          # Temporarily disabled: Linux
          # - platform: ubuntu-22.04
          #   args: ''
          #   target: ''
          #   gust_asset_suffix: linux-amd64
          #   slider_asset_suffix: linux-amd64
          #   archive: gz

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download and embed sidecar binaries
        shell: bash
        run: |
          mkdir -p src-tauri/embed

          if [ "${{ matrix.archive }}" = "zip" ]; then
            # Windows: .zip archives
            gh release download "$GUST_TAG" --repo lovitus/gust \
              -p "gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.zip" -D /tmp
            unzip -o "/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.zip" -d /tmp/gust
            GUST_BIN=$(ls /tmp/gust/gost*.exe | head -1)

            gh release download "$SLIDER_TAG" --repo lovitus/slider \
              -p "slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.zip" -D /tmp
            unzip -o "/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.zip" -d /tmp/slider
            SLIDER_BIN=$(ls /tmp/slider/slider*.exe | head -1)

            # Strip UPX compression (reduces AV false positives)
            choco install upx -y 2>/dev/null || true
            upx -d "$GUST_BIN" 2>/dev/null || true
            upx -d "$SLIDER_BIN" 2>/dev/null || true
          else
            # Unix: .gz archives
            gh release download "$GUST_TAG" --repo lovitus/gust \
              -p "gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.gz" -D /tmp
            gunzip -f "/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.gz"
            GUST_BIN="/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}"

            gh release download "$SLIDER_TAG" --repo lovitus/slider \
              -p "slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.gz" -D /tmp
            gunzip -f "/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.gz"
            SLIDER_BIN="/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}"
          fi

          # Gzip-compress into embed/ for include_bytes! at compile time
          gzip -9 -c "$GUST_BIN" > src-tauri/embed/gust.gz
          gzip -9 -c "$SLIDER_BIN" > src-tauri/embed/slider.gz

          echo "=== Embedded sidecar binaries ==="
          ls -la src-tauri/embed/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '[EST] Zashboard v__VERSION__'
          releaseBody: |
            ## Zashboard v__VERSION__ (EST)

            ### Changes in this release

            <!-- Add your changes here -->

            ---

            ### Release Info
            - **Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            - **Type**: ${{ contains(github.ref_name, '-') && 'Prerelease / test validation build' || 'Stable release' }}

            ### Documentation
            - README: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md
            - Issues: https://github.com/${{ github.repository }}/issues

            ---

            ### Downloads
            Release assets for each platform are attached below.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Download sidecar binary
        run: |
          JNILIBS="src-tauri/gen/android/app/src/main/jniLibs"
          mkdir -p "$JNILIBS/${{ matrix.abi }}"

          # gust
          gh release download "$GUST_TAG" --repo lovitus/gust \
            -p "gost-${{ matrix.sidecar-suffix }}-${GUST_VERSION}.gz" -D /tmp
          gunzip -f "/tmp/gost-${{ matrix.sidecar-suffix }}-${GUST_VERSION}.gz"
          mv "/tmp/gost-${{ matrix.sidecar-suffix }}-${GUST_VERSION}" "$JNILIBS/${{ matrix.abi }}/libgust.so"

          # slider
          gh release download "$SLIDER_TAG" --repo lovitus/slider \
            -p "slider-${{ matrix.sidecar-suffix }}-${SLIDER_VERSION}.gz" -D /tmp
          gunzip -f "/tmp/slider-${{ matrix.sidecar-suffix }}-${SLIDER_VERSION}.gz"
          mv "/tmp/slider-${{ matrix.sidecar-suffix }}-${SLIDER_VERSION}" "$JNILIBS/${{ matrix.abi }}/libslider.so"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Android manifest
        run: |
          RES_XML="src-tauri/gen/android/app/src/main/res/xml"
          mkdir -p "$RES_XML"
          cat > "$RES_XML/network_security_config.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

          python3 << 'EOF'
          manifest_path = "src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          with open(manifest_path, "r") as f:
              content = f.read()

          if "ACCESS_NETWORK_STATE" not in content:
              content = content.replace("</manifest>", '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n</manifest>')

          with open(manifest_path, "w") as f:
              f.write(content)
          EOF

      - name: Build Android APK
        run: |
          pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        run: |
          sdkmanager "build-tools;34.0.0"
          BT="$ANDROID_HOME/build-tools/34.0.0"

          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/release"
          echo "=== APK files in $APK_DIR ==="
          find "$APK_DIR" -name "*.apk" -type f 2>/dev/null || echo "No APKs found in $APK_DIR"

          UNSIGNED=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: No APK found"
            find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi

          echo "Found APK: $UNSIGNED"

          "$BT/zipalign" -f 4 "$UNSIGNED" "${UNSIGNED}.aligned"
          mv "${UNSIGNED}.aligned" "$UNSIGNED"

          "$BT/apksigner" sign \
            --ks "src-tauri/open-release.keystore" \
            --ks-pass pass:"zashboard-open-2026" \
            --ks-key-alias "zashboard" \
            --key-pass pass:"zashboard-open-2026" \
            "$UNSIGNED"

          "$BT/apksigner" verify --verbose "$UNSIGNED"

          mv "$UNSIGNED" "${APK_DIR}/zashboard-release.apk"
          echo "Signed: ${APK_DIR}/zashboard-release.apk"

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          files: src-tauri/gen/android/app/build/outputs/apk/**/zashboard-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
