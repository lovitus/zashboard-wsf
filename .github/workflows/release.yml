name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GUST_VERSION: '3.2.6'
  GUST_TAG: 'v3.2.6-relay'
  SLIDER_VERSION: '0.1.0'
  SLIDER_TAG: 'v0.1.0-test'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
            target: ''
            sidecar_triple: x86_64-pc-windows-msvc
            gust_asset_suffix: windows-amd64
            slider_asset_suffix: windows-amd64
            archive: zip
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            sidecar_triple: aarch64-apple-darwin
            gust_asset_suffix: darwin-arm64
            slider_asset_suffix: darwin-arm64
            archive: gz
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            sidecar_triple: x86_64-apple-darwin
            gust_asset_suffix: darwin-amd64
            slider_asset_suffix: darwin-amd64
            archive: gz
          - platform: ubuntu-22.04
            args: ''
            target: ''
            sidecar_triple: x86_64-unknown-linux-gnu
            gust_asset_suffix: linux-amd64
            slider_asset_suffix: linux-amd64
            archive: gz

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download sidecar binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          TRIPLE="${{ matrix.sidecar_triple }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            # Windows: .zip archives
            gh release download "$GUST_TAG" --repo lovitus/gust \
              -p "gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.zip" -D /tmp
            unzip -o "/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.zip" -d /tmp/gust
            cp /tmp/gust/gost*.exe "src-tauri/binaries/gust-${TRIPLE}.exe"

            gh release download "$SLIDER_TAG" --repo lovitus/slider \
              -p "slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.zip" -D /tmp
            unzip -o "/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.zip" -d /tmp/slider
            cp /tmp/slider/slider*.exe "src-tauri/binaries/slider-${TRIPLE}.exe"
          else
            # Unix: .gz archives
            gh release download "$GUST_TAG" --repo lovitus/gust \
              -p "gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.gz" -D /tmp
            gunzip -f "/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}.gz"
            mv "/tmp/gost-${{ matrix.gust_asset_suffix }}-${GUST_VERSION}" "src-tauri/binaries/gust-${TRIPLE}"
            chmod +x "src-tauri/binaries/gust-${TRIPLE}"

            gh release download "$SLIDER_TAG" --repo lovitus/slider \
              -p "slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.gz" -D /tmp
            gunzip -f "/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}.gz"
            mv "/tmp/slider-${{ matrix.slider_asset_suffix }}-${SLIDER_VERSION}" "src-tauri/binaries/slider-${TRIPLE}"
            chmod +x "src-tauri/binaries/slider-${TRIPLE}"
          fi

          echo "=== Sidecar binaries ==="
          ls -la src-tauri/binaries/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zashboard v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Create placeholder sidecar binaries for Android
        run: |
          mkdir -p src-tauri/binaries
          for target in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            touch "src-tauri/binaries/gust-${target}"
            touch "src-tauri/binaries/slider-${target}"
          done
          ls -la src-tauri/binaries/

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Build Android APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
